#Create a pod running a web server that has a /health endpoint. The endpoint returns success for 60 seconds, then starts failing.
#Requirements:
#Pod name: liveness-http
#Image: python:3.9-slim
#Python Flask app with /health endpoint
#Liveness Probe: HTTP GET on /health port 5000
#initialDelaySeconds: 10
#periodSeconds: 5
#failureThreshold: 3

kind: Pod
apiVersion: v1
metadata:
  name: liveness-http
spec:
  containers:
    - name: lp-container
      image: python:3.9-slim
      command: ["/bin/bash","-c"]
      args:
      - |
        pip install flask;
        cat > /app/server.py << 'EOF'
        from flask import Flask, jsonify
        import time
      
        app = Flask(__name__)
        start_time = time.time()
      
        @app.route('/health')
        def health():
            uptime = time.time() - start_time
            if uptime < 60:
                return jsonify({"status": "healthy", "uptime": uptime}), 200
            else:
                return jsonify({"status": "unhealthy"}), 500
      
        @app.route('/')
        def home():
            return "Hello from Flask!"
      
        if __name__ == '__main__':
            app.run(host='0.0.0.0', port=5000)
        EOF
        python /app/server.py
      ports:
        - containerPort: 5000
      livenessProbe:
        httpGet:
          path: /health
          port: 5000
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 3

