#create a sample manifest file and emptydir
#
kind: Pod
apiVersion: v1
metadata:
  name: my-sample-pod
spec:
  containers:
    - name: c1
      image: ubuntu
      command: ["/bin/bash","-c","while true; do echo Container c1 is running; sleep 10; done"]
      volumeMounts:
        - name: podvol
          mountPath: "/tmp/c1dir"

  volumes:
    - name: podvol
      emptyDir: {}
